server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ----------------------------
  # Compression
  # ----------------------------
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 256;

  # ----------------------------
  # API reverse proxy (ASP.NET Core)
  # ----------------------------
  location /api/ {
    proxy_pass http://webapi:5000;

    proxy_http_version 1.1;

    # Forwarded headers (critical for ASP.NET Identity + HTTPS detection)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support (safe even if unused)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "";

    # Optional tracing headers (only useful if backend uses them)
    proxy_set_header traceparent $http_traceparent;
    proxy_set_header tracestate $http_tracestate;

    # Cloudflare metadata (optional; remove if unused)
    proxy_set_header CF-IPCountry $http_cf_ipcountry;
    proxy_set_header CF-Region $http_cf_region;
  }

  # ----------------------------
  # Static assets (cache aggressively)
  # ----------------------------
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # ----------------------------
  # SPA fallback (React/Vue/Angular)
  # ----------------------------
  location / {
    try_files $uri $uri/ /index.html;
  }
}